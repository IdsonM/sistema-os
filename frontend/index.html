<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OS Manager</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
        }

        .card-dark {
            background: #1e293b;
            color: white;
        }

        .form-control {
            background: #334155;
            color: white;
            border: none;
        }

        .form-control::placeholder {
            color: #cbd5f5;
        }
    </style>

    <script src="app.js"></script>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login-box" class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center mb-3">🔐 Login</h3>

        <input id="username" class="form-control mb-2" placeholder="Usuário">
        <input id="password" type="password" class="form-control mb-3" placeholder="Senha">

        <button onclick="login()" class="btn btn-primary w-100">
            Entrar
        </button>
    </div>
</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none;" class="text-light">

    <!-- TOPO -->
    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
        <h5>
            Malato'sTech | <span class="text-info">OS Manager</span>
        </h5>

        <div>
            <span id="user-info"></span>

            <button onclick="logout()" class="btn btn-danger btn-sm ms-2">
                Sair
            </button>
        </div>
    </div>

    <!-- BUSCA -->
    <div class="p-3">
        <input class="form-control"
            placeholder="🔎 Buscar por cliente...">
    </div>

    <!-- CONTEÚDO -->
    <div class="d-flex gap-3 p-3">

        <!-- FORM -->
        <div class="card card-dark p-3" style="width: 300px;">

            <h5>🛠 Nova OS</h5>

            <input id="cliente" class="form-control mb-2" placeholder="Cliente">
            <input id="descricao" class="form-control mb-2" placeholder="Defeito">
            <input id="status" class="form-control mb-2" placeholder="Status">

            <button onclick="criarOS()" class="btn btn-primary w-100">
                Criar OS
            </button>

        </div>

        <!-- TABELA -->
        <div class="card card-dark p-3 flex-grow-1">

            <div class="d-flex justify-content-between mb-3">
                <h5>📊 Atendimentos</h5>

                <button onclick="exportarExcel()" class="btn btn-success btn-sm">
                    Exportar Excel
                </button>
            </div>

            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>OS</th>
                        <th>Cliente</th>
                        <th>Defeito</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="lista"></tbody>

            </table>

        </div>

    </div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Editar OS</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="edit_cliente" class="form-control mb-2">
        <input id="edit_descricao" class="form-control mb-2">
        <input id="edit_status" class="form-control">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button onclick="salvarEdicao()" class="btn btn-primary">Salvar</button>
      </div>

    </div>
  </div>
</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

<script src="app.js"></script> ✅

</body>
