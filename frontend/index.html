<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema OS</title>

    <!-- ✅ Bootstrap CSS CORRETO -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Seu JS -->
    <script src="app.js"></script>
</head>

<body class="bg-light">

<!-- ================= LOGIN ================= -->
<div id="login-box" class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 400px;">

        <h3 class="text-center mb-3">🔐 Login</h3>

        <input id="username" class="form-control mb-2" placeholder="Usuário">
        <input id="password" type="password" class="form-control mb-3" placeholder="Senha">

        <button onclick="login()" class="btn btn-primary w-100">
            Entrar
        </button>

    </div>
</div>


<!-- ================= APP ================= -->
<div id="app" style="display:none;" class="container mt-5">

    <!-- TOPO -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p id="user-info" class="fw-bold mb-0"></p>
        <button onclick="logout()" class="btn btn-danger">Sair</button>
    </div>

    <h2 class="mb-4">📋 Ordens de Serviço</h2>

    <!-- FORM -->
    <div class="card p-3 mb-4">

        <input id="cliente" class="form-control mb-2" placeholder="Cliente">
        <input id="descricao" class="form-control mb-2" placeholder="Descrição">
        <input id="status" class="form-control mb-3" placeholder="Status">

        <button onclick="criarOS()" class="btn btn-primary w-100">
            Criar
        </button>

    </div>

    <!-- LISTA -->
    <ul id="lista" class="list-group"></ul>

</div>


<!-- ================= MODAL EDITAR ================= -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar OS</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="edit_cliente" class="form-control mb-2" placeholder="Cliente">
        <input id="edit_descricao" class="form-control mb-2" placeholder="Descrição">
        <input id="edit_status" class="form-control" placeholder="Status">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button onclick="salvarEdicao()" class="btn btn-primary">
          Salvar
        </button>
      </div>

    </div>
  </div>
</div>


<!-- ✅ Bootstrap JS (CORRETO!!! SEM ISSO NÃO FUNCIONA) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
