<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OS Manager</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ JS -->
    <script src="app.js"></script>

    <style>
        body {
            font-family: Arial;
        }

        .bg-main {
            background: #0f172a;
            min-height: 100vh;
        }

        .card-dark {
            background: #1e293b;
            color: white;
            border-radius: 10px;
        }

        .form-control {
            background: #334155;
            color: white;
            border: none;
        }

        .form-control::placeholder {
            color: #cbd5f5;
        }
    </style>
</head>

<body class="bg-main">

<!-- ================= LOGIN ================= -->
<div id="login-box" class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center mb-3">🔐 Login</h3>

        <input id="username" class="form-control mb-2" placeholder="Usuário">
        <input id="password" type="password" class="form-control mb-3" placeholder="Senha">

        <button onclick="login()" class="btn btn-primary w-100">
            Entrar
        </button>
    </div>
</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none;">

    <!-- TOPO -->
    <div class="p-3 border-bottom text-white">
        <h5>
            Malato'sTech | <span class="text-info">OS Manager</span>
            <span class="badge bg-secondary float-end">v2.7 LAB</span>
        </h5>
    </div>

    <!-- BUSCA -->
    <div class="p-3">
        <input class="form-control"
            placeholder="🔎 Buscar por cliente, equipamento, orçamento...">
    </div>

    <!-- CONTEÚDO -->
    <div class="d-flex gap-3 p-3">

        <!-- FORM -->
        <div class="card card-dark p-3" style="width: 300px;">

            <h5>🛠 Nova Ordem de Serviço</h5>

            <input id="cliente" class="form-control mb-2" placeholder="Cliente">
            <input id="equipamento" class="form-control mb-2" placeholder="Equipamento">
            <textarea id="descricao" class="form-control mb-2" placeholder="Defeito"></textarea>

            <input id="orcamento" class="form-control mb-2" placeholder="Orçamento (R$)">
            <input id="data" class="form-control mb-2" placeholder="Data">

            <input id="status" class="form-control mb-3" placeholder="Status">

            <button onclick="criarOS()" class="btn btn-primary w-100">
                Criar OS
            </button>

        </div>

        <!-- TABELA -->
        <div class="card card-dark p-3 flex-grow-1">

            <div class="d-flex justify-content-between mb-3">
                <h5>📊 Atendimentos no Laboratório</h5>
                <button class="btn btn-success btn-sm">
                    Exportar Excel
                </button>
            </div>

            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>OS</th>
                        <th>Cliente</th>
                        <th>Equipamento</th>
                        <th>Defeito</th>
                        <th>Orçamento</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>

        </div>

    </div>

</div>

<!-- ================= MODAL EDITAR ================= -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar OS</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="edit_cliente" class="form-control mb-2" placeholder="Cliente">
