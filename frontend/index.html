<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OS Manager</title>

    <style>
        body {
            font-family: Arial;
            background: #0d1b2a;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
        }

        #login-box {
            background: #1b263b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            margin: auto;
        }

        input, select, button {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        #app {
            display: none;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ================= LOGIN ================= -->
    <div id="login-box">
        <h2>🔐 Login</h2>

        <form onsubmit="login(event)">
            <input id="username" type="text" placeholder="Usuário" required>
            <input id="password" type="password" placeholder="Senha" required>

            <form onsubmit="login(event)"></form>

            <!-- ✅ ERRO NA TELA (melhoria) -->
            <p id="erroLogin" style="color:red; margin-top:10px;"></p>
        </form>
    </div>

    <!-- ================= APP ================= -->
    <div id="app">

        <div class="topbar">
            <h2>Malato'sTech | OS Manager</h2>

            <div>
                <span id="user-info"></span>
                <button onclick="logout()">Sair</button>
            </div>
        </div>

        <!-- ================= NOVA OS ================= -->
        <h3>🛠 Nova OS</h3>

        <input id="cliente" placeholder="Cliente">
        <input id="descricao" placeholder="Descrição">
        <input id="equipamento" placeholder="Equipamento">
        <input id="orcamento" placeholder="Orçamento">
        <input id="data" type="date">

        <select id="status">
            <option>Em Análise</option>
            <option>Em Reparo</option>
            <option>Pronto</option>
        </select>

        <button onclick="criarOS()">Criar OS</button>

        <!-- ================= BUSCA ================= -->
        <input id="busca" placeholder="Buscar..." onkeyup="filtrarOS()">

        <!-- ================= TABELA ================= -->
        <h3>📋 Atendimentos</h3>

        <button onclick="exportarExcel()">Exportar</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Equipamento</th>
                    <th>R$</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="lista"></tbody>
        </table>

    </div>

</div>

<!-- SCRIPT -->
<script src="app.js"></script>

</body>
</html>
