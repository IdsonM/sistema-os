<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OS Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0b1627;
    color:#fff;
}

.topo{
    background:#162338;
    padding:15px;
}

.card-sistema{
    background:#1d2b45;
    border-radius:10px;
    padding:15px;
}

.form-control{
    background:#2b3a55;
    border:0;
    color:white;
}

.form-control::placeholder{
    color:#ccc;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login-box" class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width:400px;">
        <h3 class="text-center">🔐 Login</h3>

        <input id="username" class="form-control mb-2" placeholder="Usuário">
        <input id="password" type="password" class="form-control mb-3" placeholder="Senha">

        <button onclick="login()" class="btn btn-primary w-100">Entrar</button>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- TOPO -->
<div class="topo d-flex justify-content-between">
    <h5>Malato's<span class="text-info">Tech</span></h5>

    <div>
        <span id="user-info"></span>
        <button onclick="logout()" class="btn btn-danger btn-sm ms-2">Sair</button>
    </div>
</div>

<!-- CONTEÚDO -->
<div class="container-fluid mt-3">
<div class="row g-3">

<!-- FORM -->
<div class="col-md-4">
<div class="card-sistema">

<h5>🛠 Nova OS</h5>

<input id="cliente" class="form-control mb-2" placeholder="Cliente">
<input id="equipamento" class="form-control mb-2" placeholder="Equipamento">
<textarea id="descricao" class="form-control mb-2" placeholder="Descrição"></textarea>
<input id="orcamento" class="form-control mb-2" placeholder="Orçamento">
<input id="data" class="form-control mb-2" placeholder="Data">

<select id="status" class="form-control mb-3">
<option>Em Análise</option>
<option>Em Reparo</option>
<option>Pronto</option>
</select>

<button onclick="criarOS()" class="btn btn-info w-100">
Gravar OS
</button>

</div>
</div>

<!-- TABELA -->
<div class="col-md-8">

<input id="busca" onkeyup="filtrarOS()" class="form-control mb-3"
placeholder="🔎 Buscar por cliente ou código">

<div class="card-sistema">

<div class="d-flex justify-content-between mb-3">
<h5>📋 Atendimentos</h5>

<button onclick="exportarExcel()" class="btn btn-success btn-sm">
Exportar
</button>
</div>

<div class="table-responsive">

<table class="table table-dark table-hover">

<thead>
<tr>
<th>Cód</th>
<th>Cliente</th>
<th>Equipamento</th>
<th>R$</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>
</div>

</div>
</div>

</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
