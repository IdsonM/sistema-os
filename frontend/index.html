<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema OS</title>

<style>
body {
    font-family: Arial;
    background: #0d1b2a;
    color: white;
    text-align: center;
}

/* LOGIN */
#login-box {
    background: #1b263b;
    padding: 20px;
    margin: 100px auto;
    width: 300px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    width: 95%;
    margin: 5px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* APP */
#app {
    display: none;
    padding: 20px;
}

table {
    width: 100%;
    margin-top: 20px;
    background: #1b263b;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-box">

    <h2>🔐 Login</h2>

    <form onsubmit="login(event)">
        <input id="username" placeholder="Usuário">
        <input id="password" type="password" placeholder="Senha">

        <button type="submit">Entrar</button>

        <p id="erroLogin" style="color:red;"></p>
    </form>

    <p onclick="abrirRecuperacao()" style="cursor:pointer; font-size:12px;">
        Esqueci minha senha
    </p>

</div>

<!-- 🔧 RECUPERAÇÃO -->
<div id="recuperar" style="display:none;">
    <h3>Recuperar senha</h3>

    <input id="emailRecuperacao" placeholder="Digite seu usuário">

    <button onclick="recuperarSenha()">Recuperar</button>
    <button onclick="fecharRecuperacao()">Cancelar</button>

    <p id="msgRecuperacao"></p>
</div>

<!-- 🚀 APP (TELA 2) -->
<div id="app">

    <h2>📋 Sistema de Ordens de Serviço</h2>

    <p id="user-info"></p>

    <button onclick="logout()">Sair</button>

    <hr>

    <!-- ➕ NOVA OS -->
    <h3>Nova OS</h3>

    <input id="cliente" placeholder="Cliente">
    <input id="descricao" placeholder="Descrição">
    <input id="status" placeholder="Status">

    <button onclick="criarOS()">Criar OS</button>

    <hr>

    <!-- 📋 LISTA -->
    <h3>Ordens de Serviço</h3>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Descrição</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="lista"></tbody>
    </table>

</div>

<!-- ✅ SEU JS -->
<script src="app.js"></script>

</body>
</html>
